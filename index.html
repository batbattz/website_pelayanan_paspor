<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Proses Percepatan Pelayanan Paspor Melalui QR Code</title>
  <style>
    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background-image: linear-gradient(rgba(255,255,255,0.72), rgba(255,255,255,0.72)), url("3.jpeg");
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      background-attachment: fixed;
      color: #1a202c;
    }

    .page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      position: relative;
      z-index: 1;
    }

    .card {
      width: 100%;
      max-width: 520px;
      background: #ffffff;
      border-radius: 18px;
      box-shadow: 0 18px 40px rgba(15, 23, 42, 0.12);
      padding: 32px;
      text-align: center;
    }

    h1 {
      margin: 0 0 12px;
      font-size: 2rem;
      color: #1a202c;
      line-height: 1.2;
    }

    .highlight-label {
      display: inline-block;
      background: #2563eb;
      color: #ffffff;
      font-size: 1rem;
      padding: 8px 12px;
      border-radius: 12px;
      margin-top: 8px;
    }

    p {
      margin: 0 0 24px;
      color: #4a5568;
      line-height: 1.6;
    }

    .btn-group {
      display: grid;
      gap: 14px;
    }

    .btn-link {
      display: inline-block;
      padding: 14px 18px;
      border-radius: 999px;
      background: #2563eb;
      color: #ffffff;
      font-weight: 600;
      text-decoration: none;
      transition: transform 0.2s ease, background 0.2s ease;
    }

    .btn-link:hover {
      background: #1d4ed8;
      transform: translateY(-1px);
    }

    .footer {
      margin-top: 22px;
      font-size: 0.95rem;
      color: #718096;
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="card">
      <h1>Informasi Layanan<br>Percepatan Paspor<br><span class="highlight-label">Melalui QR Code</span></h1>
      <p>Pilih salah satu topik di bawah untuk melihat informasi lebih lengkap.</p>
      <div class="btn-group">
        <a class="btn-link" href="persyaratan.html">Persyaratan Paspor</a>
        <a class="btn-link" href="alur.html">Alur Pelayanan Paspor</a>
        <a class="btn-link" href="kontak.html">Kontak Layanan</a>
      </div>
    </div>
  </div>
</body>
</html>
